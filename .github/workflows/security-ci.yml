name: Security CI

on:
  push:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Run npm audit
        run: npm audit --audit-level=moderate

      - name: Run ESLint
        run: npx eslint server.js
